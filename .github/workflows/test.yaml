name: Listing S3 Buckets

on: 
  push:
    branches:
      - master
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  listing_buckets:
    runs-on: ubuntu-latest
    steps:
      - name: Set up AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.IAM_ROLE_MARCH06 }}
          aws-region: ${{ secrets.AWS_REGION_MARCH06 }}
      
      - name: List S3 Buckets
        env: 
          AWS_REGION: ${{ secrets.AWS_REGION_MARCH06 }}
        run: |
          echo "Listing1 S3 Buckets"
          aws s3 ls